<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOLFIN YÖNETİM PANELİ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ff0000',
            'primary-hover': '#e60000',
            'primary-focus': '#cc0000',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #contentFrame { border: none; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <div id="adminScreen" class="min-h-screen bg-gray-50 flex flex-col">
    <nav class="bg-white shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 py-4">
          <h1 class="text-lg sm:text-xl font-semibold text-primary">DOLFIN DOKÜMANTASYON SİSTEMİ</h1>
          <div class="flex flex-wrap items-center gap-2 sm:gap-3">
            <button type="button" id="btnMakine" data-view="makine.html"
              class="nav-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 bg-primary text-white shadow-lg shadow-primary/25">
              Makine
            </button>
            <button type="button" id="btnDokuman" data-view="dokuman.html"
              class="nav-btn px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200">
              Doküman
            </button>
            <button type="button" id="adminLogoutBtn"
              class="px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 bg-gray-100 text-gray-700 hover:bg-gray-200">
              Çıkış
            </button>
          </div>
        </div>
      </div>
    </nav>
    <main class="flex-1 p-4 sm:p-6">
      <div class="max-w-7xl mx-auto h-full">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden min-h-[calc(100vh-8rem)]">
          <iframe id="contentFrame" src="makine.html" title="Yönetim"
            class="w-full min-h-[calc(100vh-8rem)]"></iframe>
        </div>
      </div>
    </main>
  </div>

  <script>
    const navButtons = document.querySelectorAll('.nav-btn');
    const contentFrame = document.getElementById('contentFrame');
    const activeClasses = ['bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/25'];
    const inactiveClasses = ['bg-gray-100', 'text-gray-700', 'hover:bg-gray-200'];

    function setActiveBtn(activeBtn) {
      navButtons.forEach(function (btn) {
        btn.classList.remove.apply(btn.classList, activeClasses.concat(inactiveClasses));
        btn.classList.add.apply(btn.classList, btn === activeBtn ? activeClasses : inactiveClasses);
      });
    }

    navButtons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        contentFrame.src = btn.getAttribute('data-view');
        setActiveBtn(btn);
      });
    });

    // Cloudflare Access oturumunu kapatır (canlıda). Yerel testte 404 verebilir.
    document.getElementById('adminLogoutBtn').addEventListener('click', function () {
      window.location.href = '/cdn-cgi/access/logout';
    });
  </script>
</body>
</html>
